name: eventful_app
description: Eventful - Etkinlik Rehberi

publish_to: 'none'
version: 2.5.2+32

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0
  firebase_storage: ^13.0.0
  firebase_messaging: ^16.0.0
  firebase_app_check: ^0.4.4+2
  flutter_local_notifications: ^22.0.0
  image_picker: ^1.0.7
  url_launcher: ^6.3.0
  geolocator: ^14.0.3
  geocoding: ^4.0.0
  google_maps_flutter: ^2.10.0
  cached_network_image: ^3.3.1
  dio: ^5.7.0
  etkinlik_io_api: ^2.0.10
  http: ^1.2.1
  html: ^0.15.4
  flutter_rating_bar: ^4.0.1
  cupertino_icons: ^1.0.6
  rxdart: ^0.28.0
  mask_text_input_formatter: ^2.8.0
  intl: ^0.20.2
  device_info_plus: ^13.1.0
  package_info_plus: ^10.1.0
  flutter_cache_manager: ^3.4.0
  share_plus: ^13.1.0
  cloud_functions: ^6.0.0
  path_provider: ^2.1.2
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  shimmer: ^3.0.0
  introduction_screen: ^4.0.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  google_sign_in: ^6.3.0
  sign_in_with_apple: ^6.1.1
  in_app_purchase: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  fake_cloud_firestore: ^4.1.0+1
  firebase_auth_mocks: ^0.15.1
  mockito: ^5.4.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
