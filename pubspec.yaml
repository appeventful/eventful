name: eventful_app
description: Eventful - Etkinlik Rehberi

publish_to: 'none'
version: 2.5.0+26

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  firebase_core: ^4.8.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0
  firebase_messaging: ^16.2.0
  firebase_app_check: ^0.4.3
  flutter_local_notifications: ^17.2.1
  image_picker: ^1.0.7
  url_launcher: ^6.3.0
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  google_maps_flutter: ^2.10.0
  cached_network_image: ^3.3.1
  http: ^1.2.1
  html: ^0.15.4
  flutter_rating_bar: ^4.0.1
  cupertino_icons: ^1.0.6
  rxdart: ^0.28.0
  mask_text_input_formatter: ^2.8.0
  intl: ^0.20.2
  device_info_plus: ^10.1.0
  package_info_plus: ^8.0.0
  flutter_cache_manager: ^3.4.0
  share_plus: ^10.1.4
  cloud_functions: ^6.2.0
  path_provider: ^2.1.2
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  shimmer: ^3.0.0
  introduction_screen: ^3.1.14
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.0
  google_sign_in: ^7.2.0
# firebase_dynamic_links: ^6.1.10

dependency_overrides:
  firebase_core: ^4.8.0
  firebase_core_platform_interface: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  fake_cloud_firestore: ^4.1.0+1
  firebase_auth_mocks: ^0.15.1
  mockito: ^5.4.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
