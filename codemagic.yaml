workflows:
  ios-workflow:
    name: Eventful iOS

    max_build_duration: 60
    instance_type: mac_mini_m1

    integrations:
      app_store_connect: Apple_Developer

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.appeventful.eventful

      vars:
        APP_ID: "com.appeventful.eventful"

    triggering:
      events:
        - push

      branch_patterns:
        - pattern: main
        - pattern: master

    scripts:
      - name: Fetch Flutter packages
        script: flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Build IPA
        script: |
          flutter build ipa \
            --release \
            --export-method app-store

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
