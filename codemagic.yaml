workflows:
  ios-workflow:
    name: Eventful iOS

    max_build_duration: 60

    integrations:
      app_store_connect: Apple_Developer

    environment:
      flutter: stable
      xcode: latest

      vars:
        APP_ID: com.appeventful.eventful

    scripts:
      - name: Flutter packages
        script: |
          flutter pub get

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$APP_ID" --type IOS_APP_STORE --create
          xcode-project use-profiles

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Build IPA
        script: |
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
