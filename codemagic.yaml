# Codemagic CI/CD Configuration for Eventful iOS Build
# Daha fazla bilgi için: https://docs.codemagic.io/yaml-quick-start/quick-start-guide/

workflows:
  ios-workflow:
    name: Eventful - Etkinlik Rehberi
    max_build_duration: 60
    instance_type: mac_mini_m1
    
    integrations:
      app_store_connect: Apple_Developer

    environment:
      groups:
        - app_store_connect
      vars:
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
        APP_ID: "com.appeventful.eventful"
        APPLE_TEAM_ID: "98G75Q6ZPJ"
      flutter: stable
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
        - pattern: 'master'
        - pattern: 'dev'

    scripts:
      - name: Force iOS Deployment Target and Development Team
        script: |
          # Firebase paketlerinin iOS 15+ zorunluluğunu çözer
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 14.0;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g' ios/Runner.xcodeproj/project.pbxproj
          
          # Proje dosyalarının içine Team ID'nizi enjekte eder
          sed -i '' "s/DEVELOPMENT_TEAM = [^;]*/DEVELOPMENT_TEAM = $APPLE_TEAM_ID/g" ios/Runner.xcodeproj/project.pbxproj

      - name: Set up code signing settings on Xcode project
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$APP_ID" --create
          xcode-project use-profiles

      - name: Get Flutter packages
        script: |
          flutter precache --ios
          flutter pub get

      - name: Pod Install
        script: |
          cd ios && pod install

      - name: Flutter build IPA
        script: |
          flutter build ipa \
            --release \
            --export-method=app-store \
            --build-name=1.0.1 \
            --build-number=2

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        # Hata veren alt grubu temizledik, TestFlight gönderimini en sade haliyle kilitledik:
        submit_to_testflight: true
      email:
        recipients:
          - eventful@eventfulapp.org
        notify:
          success: true
          failure: true