# Codemagic CI/CD Configuration for Eventful iOS Build
# Daha fazla bilgi için: https://docs.codemagic.io/yaml-quick-start/quick-start-guide/

workflows:
  ios-workflow:
    name: Eventful - Etkinlik Rehberi
    max_build_duration: 60
    instance_type: mac_mini_m1
    
    integrations:
      app_store_connect: Apple_Developer

    environment:
      groups:
        - app_store_connect
      vars:
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
        APP_ID: "com.appeventful.eventful"
      flutter: stable
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
        - pattern: 'master'
        - pattern: 'dev'

    scripts:
      - name: Force iOS Deployment Target to 15.0
        script: |
          # Firebase paketlerinin iOS 15+ zorunluluğunu çözmek için proje hedefini günceller
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 14.0;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g' ios/Runner.xcodeproj/project.pbxproj

      - name: Set up code signing settings on Xcode project
        script: |
          keychain initialize
          # Apple Developer hesabından Admin yetkisiyle sertifikaları çeker/yoksa üretir
          app-store-connect fetch-signing-files "$APP_ID" --create
          xcode-project use-profiles

      - name: Get Flutter packages
        script: |
          flutter precache --ios
          flutter pub get

      - name: Pod Install
        script: |
          cd ios && pod install

      - name: Flutter build IPA
        script: |
          # Flutter sertifika aramadan arşivi sorunsuz tamamlar.
          # Sürüm numaralarını App Store kurallarına uygun olarak buraya gömüyoruz:
          flutter build ipa --release \
            --export-method=app-store \
            --build-name=1.0.0 \
            --build-number=1 \
            --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        # İŞTE EN ÖNEMLİ NOKTA: Üstte imzasız üretilen IPA dosyasını,
        # Codemagic entegrasyonu buradaki biletle (API Key) Apple sunucusuna gönderirken mühürler.
        auth: integration
      email:
        recipients:
          - eventful@eventfulapp.org
        notify:
          success: true
          failure: true