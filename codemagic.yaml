# Codemagic CI/CD Configuration for Eventful iOS Build
# Daha fazla bilgi için: https://docs.codemagic.io/yaml-quick-start/quick-start-guide/

workflows:
  ios-workflow:
    name: Eventful - Etkinlik Rehberi
    max_build_duration: 60
    instance_type: mac_mini_m1
    
    environment:
      groups:
        # Entegrasyon sayfasındaki Apple Developer bağınızı buraya mühürlüyoruz
        - app_store_connect
      vars:
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
      flutter: stable
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
        - pattern: 'master'
        - pattern: 'dev'

    scripts:
      - name: Force iOS Deployment Target to 15.0
        script: |
          # Firebase paketlerinin iOS 15+ zorunluluğunu çözmek için ana proje ayarlarını günceller
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 14.0;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g' ios/Runner.xcodeproj/project.pbxproj

      - name: Set up code signing settings on Xcode project
        script: |
          # Apple Developer hesabınızdaki sertifikaları sanal Mac'e indirip projeye bağlar
          xcode-project use-profiles

      - name: Get Flutter packages
        script: |
          flutter precache --ios
          flutter pub get

      - name: Pod Install
        script: |
          cd ios && pod install

      - name: Flutter build IPA
        script: |
          # Uygulamayı Apple sertifikalarıyla imzalanmış (codesign aktif) şekilde paketler
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        # Derleme bittiğinde uygulamayı doğrudan App Store Connect (TestFlight)'e uçurur
        auth: integration
      email:
        recipients:
          - eventful@eventfulapp.org
        notify:
          success: true
          failure: true