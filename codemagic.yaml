workflows:
  ios-workflow:
    name: Eventful iOS

    max_build_duration: 60
    instance_type: mac_mini_m1

    integrations:
      app_store_connect: Apple_Developer

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

      vars:
        APP_ID: "com.appeventful.eventful"
        APPLE_TEAM_ID: "98G75Q6ZPJ"

    triggering:
      events:
        - push

      branch_patterns:
        - pattern: main
        - pattern: master

    scripts:
      - name: Fetch Flutter packages
        script: |
          flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Configure code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$APP_ID" --type IOS_APP_STORE --create
          xcode-project use-profiles

      - name: Build IPA
        script: |
          flutter build ipa \
            --release \
            --export-method app-store

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
